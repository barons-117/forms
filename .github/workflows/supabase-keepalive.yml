name: Supabase Keep-Alive

# Pings the Supabase project once a day so it doesn't get auto-paused
# after 7 days of inactivity on the Free tier.

on:
  schedule:
    # Every day at 06:00 UTC (09:00 Israel time)
    - cron: '0 6 * * *'
  workflow_dispatch: # allows manual run from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          echo "Pinging Supabase project qfoftmwpmivptlyniqhk..."
          HTTP_CODE=$(curl -sS -o /tmp/response.json -w "%{http_code}" \
            "https://qfoftmwpmivptlyniqhk.supabase.co/rest/v1/forms?select=id&limit=1" \
            -H "apikey: sb_publishable_AS1TpWV0FuBK9xiU-WlpHA_JZ5LOUVT" \
            -H "Authorization: Bearer sb_publishable_AS1TpWV0FuBK9xiU-WlpHA_JZ5LOUVT")

          echo "HTTP status: $HTTP_CODE"
          cat /tmp/response.json

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Supabase is alive"
            exit 0
          else
            echo "❌ Supabase ping failed"
            exit 1
          fi
